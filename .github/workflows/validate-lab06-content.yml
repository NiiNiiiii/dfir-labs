name: validate-lab06-content

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/validate-lab06-content.yml'
      - '.github/workflows/package-lab06-content.yml'
      - '.github/workflows/lab06-oidc-smoke-test.yml'
      - 'labs/lab-06-entra-id-detection-engineering-gated-content-pipeline/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      LAB06_DIR: labs/lab-06-entra-id-detection-engineering-gated-content-pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validator dependency
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate repo structure and hygiene
        run: python "${LAB06_DIR}/scripts/validate_repo.py" "${LAB06_DIR}"

      - name: Validate deployable JSON
        run: python "${LAB06_DIR}/scripts/validate_deployable_json.py" "${LAB06_DIR}"

      - name: Validate detection metadata
        run: python "${LAB06_DIR}/scripts/validate_detection_metadata.py" "${LAB06_DIR}"

      - name: Validate workflow guardrails
        run: python "${LAB06_DIR}/scripts/validate_workflow_guardrails.py" "${LAB06_DIR}"

      - name: Validate README evidence
        run: python "${LAB06_DIR}/scripts/validate_readme_evidence.py" "${LAB06_DIR}"
