name: deploy-lab06-test

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: sentinel-test
    env:
      LAB06_DIR: labs/lab-06-entra-id-detection-engineering-gated-content-pipeline
      AZURE_RG_TEST: ${{ vars.AZURE_RG_TEST }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      SENTINEL_WORKSPACE_NAME_TEST: ${{ vars.SENTINEL_WORKSPACE_NAME_TEST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validator dependency
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Validate repo structure and hygiene
        shell: bash
        run: |
          python "${LAB06_DIR}/scripts/validate_repo.py" "${LAB06_DIR}"

      - name: Validate deployable JSON
        shell: bash
        run: |
          python "${LAB06_DIR}/scripts/validate_deployable_json.py" "${LAB06_DIR}"

      - name: Validate detection metadata
        shell: bash
        run: |
          python "${LAB06_DIR}/scripts/validate_detection_metadata.py" "${LAB06_DIR}"

      - name: Validate workflow guardrails
        shell: bash
        run: |
          python "${LAB06_DIR}/scripts/validate_workflow_guardrails.py" "${LAB06_DIR}"

      - name: Validate README evidence
        shell: bash
        run: |
          python "${LAB06_DIR}/scripts/validate_readme_evidence.py" "${LAB06_DIR}"

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Bicep is available
        shell: bash
        run: |
          az bicep install
          az bicep version

      - name: Resolve test workspace resource ID
        shell: bash
        run: |
          TEST_WORKSPACE_ID=$(az monitor log-analytics workspace show \
            --resource-group "${AZURE_RG_TEST}" \
            --workspace-name "${SENTINEL_WORKSPACE_NAME_TEST}" \
            --query id -o tsv)
          echo "TEST_WORKSPACE_ID=${TEST_WORKSPACE_ID}" >> "${GITHUB_ENV}"

      - name: Run ARM what-if
        shell: bash
        run: |
          mkdir -p "${LAB06_DIR}/artifacts"
          az deployment group what-if \
            --resource-group "${AZURE_RG_TEST}" \
            --template-file "${LAB06_DIR}/pipeline/deploy/main.bicep" \
            --parameters @"${LAB06_DIR}/pipeline/parameters/test.parameters.json" \
                         location="${AZURE_LOCATION}" \
                         workspaceResourceId="${TEST_WORKSPACE_ID}" \
            --result-format FullResourcePayloads \
            --no-pretty-print \
            -o json > "${LAB06_DIR}/artifacts/whatif.json"

      - name: Evaluate what-if
        shell: bash
        run: |
          python "${LAB06_DIR}/scripts/evaluate_whatif.py" \
            "${LAB06_DIR}" \
            "${LAB06_DIR}/artifacts/whatif.json" \
            "${AZURE_RG_TEST}"

      - name: Deploy content to test workspace
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${AZURE_RG_TEST}" \
            --template-file "${LAB06_DIR}/pipeline/deploy/main.bicep" \
            --parameters @"${LAB06_DIR}/pipeline/parameters/test.parameters.json" \
                         location="${AZURE_LOCATION}" \
                         workspaceResourceId="${TEST_WORKSPACE_ID}" \
            -o json > "${LAB06_DIR}/artifacts/deployment-result.json"

      - name: Post-deploy resource inventory
        shell: bash
        run: |
          az resource list \
            --resource-group "${AZURE_RG_TEST}" \
            --query "[?contains(type, 'Microsoft.SecurityInsights') || type=='Microsoft.Insights/workbooks'].{name:name,type:type,location:location}" \
            -o table | tee "${LAB06_DIR}/artifacts/post-deploy-inventory.txt"

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lab06-deploy-artifacts
          path: |
            labs/lab-06-entra-id-detection-engineering-gated-content-pipeline/artifacts/whatif.json
            labs/lab-06-entra-id-detection-engineering-gated-content-pipeline/artifacts/whatif-evaluation.json
            labs/lab-06-entra-id-detection-engineering-gated-content-pipeline/artifacts/deployment-result.json
            labs/lab-06-entra-id-detection-engineering-gated-content-pipeline/artifacts/post-deploy-inventory.txt